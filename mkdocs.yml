site_name: iFunny API (Unofficial)
site_description: Unofficial, reverse-engineered documentation for the iFunny API.
site_url: https://open-ifunny.github.io/
repo_url: https://github.com/Open-iFunny/open-ifunny.github.io
repo_name: Open-iFunny/open-ifunny.github.io
edit_uri: edit/main/docs/
copyright: >
  Community-maintained, not affiliated with iFunny or FunCorp.

# Emit explicit foo.html files rather than foo/index.html + pretty URLs.
# Internal links are rewritten to include the .html extension so the site
# is browsable directly (including over file:// for local previews) and
# every anchor points at a concrete resource.
use_directory_urls: false

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.indexes
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  # Base MkDocs extensions
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      # Cap the per-page "on this page" TOC at H1-H3 so it reads as a menu of
      # operations/procedures (rendered as H3) instead of every sub-section
      # heading (path/query params, request body, per-response codes).
      toc_depth: 3
  # PyMdown Extensions - required by Material for tabs, code blocks, etc.
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      # Snippet includes (--8<-- "...") resolve relative to docs/ so
      # generated fragments under docs/_snippets/ (schema and operation
      # trios emitted by scripts/generate-docs.js) are addressable as
      # "_snippets/schemas/UserProfile.md" etc.
      base_path: [docs]
      check_paths: true
      auto_append: []
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search

# Snippet fragments under docs/_snippets/ are included into other pages
# via pymdownx.snippets; they are not themselves pages, so keep them out
# of the built site.
exclude_docs: |
  _snippets/

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Interacting with iFunny:
      - interacting/index.md
      - Connecting and Authenticating: interacting/connecting-and-authenticating.md
      - Exploring Feeds and Curations: interacting/exploring-feeds-and-curations.md
      - Making Friends and Foes: interacting/making-friends-and-foes.md
      - Chats and Channels: interacting/chats-and-channels.md
      - Trust and Safety: interacting/trust-and-safety.md
  - Reference:
      - API Reference:
          - reference/api/index.md
          - REST:
              - reference/api/rest/index.md
              - 🔑 OAuth2: reference/api/rest/oauth2.md
              - 🙂 Client: reference/api/rest/client.md
              - ⚖️ Bans & Appeals: reference/api/rest/bans-appeals.md
              - 🫂 Users: reference/api/rest/users.md
              - 📸 Content: reference/api/rest/content.md
              - 💭 Comments: reference/api/rest/comments.md
              - 📡 Chat: reference/api/rest/chat.md
              - 🧭 Discovery: reference/api/rest/discovery.md
          - WAMP:
              - reference/api/wamp/index.md
              - 💬 Chats + DMs: reference/api/wamp/chats-dms.md
              - 📬 Subscriptions + Events: reference/api/wamp/subscriptions-events.md
              - 🔪 Procedures: reference/api/wamp/procedures.md
