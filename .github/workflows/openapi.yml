name: OpenAPI

on:
  push:
    branches: [main]
    paths:
      - "gitbook/openapi/**"
      - ".github/workflows/openapi.yml"
  pull_request:
    paths:
      - "gitbook/openapi/**"
      - ".github/workflows/openapi.yml"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli@1.25.5 lint gitbook/openapi/ifunny-api.yaml

  build:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build static Redoc site
        run: |
          mkdir -p _site
          npx --yes @redocly/cli@1.25.5 build-docs gitbook/openapi/ifunny-api.yaml -o _site/index.html
          cp gitbook/openapi/ifunny-api.yaml _site/ifunny-api.yaml
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
