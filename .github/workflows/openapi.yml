name: OpenAPI

on:
  push:
    branches: [main, staging]
    paths:
      - "gitbook/openapi/**"
      - "scripts/**"
      - "package.json"
      - "yarn.lock"
      - "flake.nix"
      - "flake.lock"
      - "default.nix"
      - ".github/workflows/openapi.yml"
  pull_request:
    paths:
      - "gitbook/openapi/**"
      - "scripts/**"
      - "package.json"
      - "yarn.lock"
      - "flake.nix"
      - "flake.lock"
      - "default.nix"
      - ".github/workflows/openapi.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli@1.25.5 lint gitbook/openapi/ifunny-api.yaml

  render:
    needs: lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      # scripts/generate-docs.js is the single source of the Markdown under
      # gitbook/reference/api-reference/ (plus gitbook/SUMMARY.md) - GitBook
      # syncs its content straight from this repo, so the rendered output
      # has to be committed, not just built as an ephemeral artifact.
      - name: Render GitBook markdown from the OpenAPI spec (via Nix, reproducibly)
        run: |
          nix build .#docs --print-build-logs
          # -L dereferences the `result` symlink into the read-only nix
          # store, copying the freshly rendered files over the checked-out
          # working tree so git sees real, writable files to diff/commit.
          cp -rL result/reference/api-reference/. gitbook/reference/api-reference/
          cp -L result/SUMMARY.md gitbook/SUMMARY.md
          chmod -R u+w gitbook/reference/api-reference gitbook/SUMMARY.md
      - name: Commit and push regenerated docs
        run: |
          if git diff --quiet -- gitbook/; then
            echo "Generated docs are already up to date, nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitbook/
          git commit -m "Regenerate API reference docs from OpenAPI spec"
          git push origin "HEAD:${{ github.ref_name }}"
