name: Docs (OpenAPI + WAMP)

on:
  push:
    branches: [main, staging]
    paths:
      - "gitbook/openapi/**"
      - "wamp/**"
      - "docs/**"
      - "scripts/**"
      - "mkdocs.yml"
      - "package.json"
      - "yarn.lock"
      - "flake.nix"
      - "flake.lock"
      - "default.nix"
      - ".github/workflows/openapi.yml"
  pull_request:
    paths:
      - "gitbook/openapi/**"
      - "wamp/**"
      - "docs/**"
      - "scripts/**"
      - "mkdocs.yml"
      - "package.json"
      - "yarn.lock"
      - "flake.nix"
      - "flake.lock"
      - "default.nix"
      - ".github/workflows/openapi.yml"

permissions:
  contents: read

jobs:
  lint-openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli@1.25.5 lint gitbook/openapi/ifunny-api.yaml

  lint-wamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install js-yaml (only dep the parser uses at runtime)
        run: npm install --no-save js-yaml@4
      # scripts/wamp/parse.js resolves $refs and runs the shape checks
      # from scripts/wamp/schema.json. It exits non-zero on any failure,
      # which is exactly what we want a lint job to do.
      - name: Lint WAMP-Spec document
        run: node scripts/wamp/parse.js wamp/ifunny-wamp.yaml

  build:
    needs: [lint-openapi, lint-wamp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      # `.#site` runs generate-docs.js under yarnBuildHook to render the
      # API reference into docs/, then mkdocs build --strict against the
      # combined tree. --strict fails on broken links, so this doubles as
      # a link check for every PR.
      - name: Build MkDocs Material site
        run: nix build .#site --print-build-logs
      # `result` is a symlink into the nix store; upload-artifact needs a
      # real writable tree, so dereference into ./public first.
      - name: Materialize site into ./public
        if: github.ref == 'refs/heads/main'
        run: |
          rm -rf public
          cp -rL result public
          chmod -R u+w public
      # The built site is the deliverable of this repo. Upload it as an
      # artifact so the sibling open-ifunny.github.io repo can pull it in
      # its own deploy workflow (see .github/workflows/deploy.yml over
      # there). The name here is what that workflow greps for.
      - name: Upload site artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: public/
          retention-days: 7

  # Fire-and-forget: tell open-ifunny.github.io that a new site artifact
  # is ready. Its deploy workflow (repository_dispatch: deploy-site) will
  # cross-repo-download our `site` artifact and publish it to Pages.
  #
  # We don't deploy directly from here because the Pages target lives on
  # a different repo, and actions/deploy-pages only publishes to its
  # *own* repo's Pages. Kicking a dispatch on the target keeps the built
  # site out of any long-lived branch - it stays an artifact.
  notify-deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy on open-ifunny.github.io
        env:
          GH_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          gh api \
            --method POST \
            repos/Open-iFunny/open-ifunny.github.io/dispatches \
            -f event_type=deploy-site \
            -f client_payload[source_repo]=${{ github.repository }} \
            -f client_payload[run_id]=${{ github.run_id }} \
            -f client_payload[sha]=${{ github.sha }}
