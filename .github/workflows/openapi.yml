name: OpenAPI

on:
  push:
    branches: [main]
    paths:
      - "gitbook/openapi/**"
      - "scripts/**"
      - "package.json"
      - "yarn.lock"
      - "flake.nix"
      - "flake.lock"
      - "default.nix"
      - ".github/workflows/openapi.yml"
  pull_request:
    paths:
      - "gitbook/openapi/**"
      - "scripts/**"
      - "package.json"
      - "yarn.lock"
      - "flake.nix"
      - "flake.lock"
      - "default.nix"
      - ".github/workflows/openapi.yml"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli@1.25.5 lint gitbook/openapi/ifunny-api.yaml

  build:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build docs via Nix (custom single-column generator)
        run: |
          nix build .#docs --print-build-logs
          mkdir -p _site
          # -L dereferences the `result` symlink into the read-only nix store,
          # copying the actual index.html + ifunny-api.yaml into _site/.
          cp -rL result/. _site/
          chmod -R u+w _site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
