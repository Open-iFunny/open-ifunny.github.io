name: Docs (OpenAPI + WAMP)

on:
  push:
    branches: [main]
    paths: &site_paths
      - "gitbook/openapi/**"
      - "wamp/**"
      - "docs/**"
      - "scripts/**"
      - "mkdocs.yml"
      - "package.json"
      - "yarn.lock"
      - "flake.nix"
      - "flake.lock"
      - "default.nix"
      - ".github/workflows/openapi.yml"
  pull_request:
    paths: *site_paths

permissions:
  contents: read

jobs:
  lint-openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli@2.38.0 lint gitbook/openapi/ifunny-api.yaml

  lint-wamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install js-yaml (only dep the parser uses at runtime)
        run: npm install --no-save js-yaml@4
      # scripts/wamp/parse.js resolves $refs and runs the shape checks
      # from scripts/wamp/schema.json. It exits non-zero on any failure,
      # which is exactly what we want a lint job to do.
      - name: Lint WAMP-Spec document
        run: node scripts/wamp/parse.js wamp/ifunny-wamp.yaml

  build:
    needs: [lint-openapi, lint-wamp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: DeterminateSystems/magic-nix-cache-action@v7
      # `.#site` runs generate-docs.js under yarnBuildHook to render the
      # API reference into docs/, then mkdocs build --strict against the
      # combined tree. --strict fails on broken links, so this doubles as
      # a link check for every PR.
      - name: Build MkDocs Material site
        run: nix build .#site --print-build-logs
      # `result` is a symlink into the nix store; upload-pages-artifact
      # needs a real writable directory (it tars + sets permissions), so
      # dereference into ./public first.
      - name: Materialize site into ./public
        if: github.ref == 'refs/heads/main'
        run: |
          cp -rL result public
          chmod -R u+w public
      - name: Package for Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  # Self-contained deploy: Pages source is set to "GitHub Actions" and
  # served from this same repo (open-ifunny.github.io => root URL), so
  # actions/deploy-pages just picks up the artifact from `build` and
  # publishes it. No cross-repo dispatch, no PAT.
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Serialize deploys; queue a new run rather than cancelling, to avoid
    # leaving Pages half-updated.
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v5
