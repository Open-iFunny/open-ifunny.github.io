apis:
  main:
    root: gitbook/openapi/ifunny-api.yaml

theme:
  openapi:
    htmlTemplate: gitbook/openapi/redoc-template.hbs
    theme:
      colors:
        primary:
          main: '#58a6ff'
        text:
          primary: '#c9d1d9'
          secondary: '#8b949e'
        border:
          dark: '#21262d'
          light: '#30363d'
        http:
          get: '#3fb950'
          post: '#58a6ff'
          put: '#d29922'
          delete: '#f85149'
          options: '#8b949e'
          patch: '#bc8cff'
          basic: '#8b949e'
          link: '#58a6ff'
          head: '#8b949e'
        responses:
          success:
            color: '#3fb950'
            backgroundColor: '#0f2415'
          error:
            color: '#f85149'
            backgroundColor: '#2d1214'
          redirect:
            color: '#d29922'
            backgroundColor: '#2d2210'
          info:
            color: '#58a6ff'
            backgroundColor: '#0d1c2e'
      schema:
        linesColor: '#30363d'
        typeNameColor: '#79c0ff'
        typeTitleColor: '#79c0ff'
        requireLabelColor: '#f85149'
        nestedBackground: '#161b22'
      sidebar:
        backgroundColor: '#161b22'
        textColor: '#c9d1d9'
        activeTextColor: '#58a6ff'
      rightPanel:
        backgroundColor: '#010409'
        textColor: '#c9d1d9'
      codeBlock:
        backgroundColor: '#010409'
