      parameters:
        - name: content_id
          in: path
          required: true
          schema:
            type: string
        - name: comment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comment Smilers
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      smiles_count:
                        type: integer
                      users:
                        allOf:
                          - $ref: "#/components/schemas/PagedResult"
                          - properties:
                              items:
                                type: array
                                items:
                                  $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: smileComment
      tags: [Comments]
      summary: Smile Comment
      description: |
        Smile a comment by its ID.
        If the comment was unsmiled by the client, this will remove that unsmile.
      security:
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: content_id
          in: path
          required: true
          schema:
            type: string
        - name: comment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
