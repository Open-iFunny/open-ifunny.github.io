openapi: 3.1.0
info:
  title: iFunny API (Unofficial)
  version: "4.0.0"
  description: |
    Unofficial, reverse-engineered documentation for the iFunny REST API (v4).

    This is a community-maintained specification and is **not affiliated with iFunny or FunCorp**.
    Provided solely for educational and research purposes. Please review iFunny's
    [Terms of Service](https://ifunny.co/app/terms) before using this documentation.

    ## Authentication

    Most endpoints require either a **Basic** token or a **Bearer** token in the
    `Authorization` header, plus the `ifunny-project-id: iFunny` header on every request.
    See the "Basic Token Generation" guide (ported separately) for how to derive a Basic token,
    and the `oauth2` operations below for exchanging it for a Bearer token.

    Endpoints marked `Basic | Bearer` accept either credential type; behavior may differ
    subtly between the two (noted per-operation where known).

    ## Known documentation quirks (carried over / corrected from the source Markdown)

    - The source docs listed both "Login" and "Refresh Bearer Token" on `POST /oauth2/login`.
      This is preserved here as a single operation accepting either a password grant or a
      refresh grant via `oneOf` request bodies.
    - "Upload Content" was documented as `GET /content` despite taking a `multipart/form-data`
      body; it has been corrected to `POST /content` here.
    - A couple of base URLs in the source docs were typo'd as `https://api.ifunny/mobi/v4`;
      normalized to `https://api.ifunny.mobi/v4` throughout.
    - Path `/users/:id/updates_subcribers` (PUT) vs `/users/:id/updates_subscribers` (DELETE)
      is a genuine spelling inconsistency in the live API, not a transcription error, and is
      preserved as two distinct paths.
  license:
    name: GPL-3.0
    url: https://github.com/Open-iFunny/api-docs/blob/main/LICENSE
externalDocs:
  description: iFunny Chats (WAMP over WebSocket) protocol docs — not representable in OpenAPI, kept as Markdown
  url: https://github.com/Open-iFunny/api-docs/tree/main/gitbook/reference/chats

servers:
  - url: https://api.ifunny.mobi/v4
    description: Production API

tags:
  - name: OAuth2
    description: Authentication and authorization
  - name: Client
    description: Methods for the authenticated client's own account
  - name: Users
    description: Methods for interacting with other users
  - name: Content
    description: Methods for interacting with content (posts)
  - name: Comments
    description: Methods for interacting with comments
  - name: Chat
    description: |
      REST endpoints for discovering and looking up chat channels. Real-time
      chat messaging itself is WAMP over WebSocket to `chat.ifunny.co` and is
      documented in Markdown (see externalDocs).
  - name: Discovery
    description: Explore compilations, weekly digests, and other content-discovery feeds.
  - name: Tasks
    description: Polling endpoints for asynchronous server-side jobs (e.g. content upload).

security:
  - BasicAuth: []
    ProjectId: []
  - BearerAuth: []
    ProjectId: []

paths:
  /users:
    post:
      operationId: registerAccount
      tags: [OAuth2]
      summary: Register Account
      description: Create a new account on iFunny.
      security:
        - BasicAuth: []
          ProjectId: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [reg_type, nick, email, password, accepted_mailing]
              properties:
                reg_type:
                  type: string
                  const: pwd
                nick:
                  type: string
                  description: Username for the account
                email:
                  type: string
                  description: Email for the account
                password:
                  type: string
                  description: Password for the account
                accepted_mailing:
                  type: integer
                  enum: [0, 1]
                  description: 0 for no, 1 for yes
      responses:
        "200":
          description: Account Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Your new user id
                  status:
                    type: integer
                    const: 200
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: bad_request
                error_description: string
                status: 400
        "403":
          description: Invalid Email or Email Already Exists
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Error"
                examples:
                  invalid_email:
                    value:
                      error: invalid_email
                      error_description: Domain of email was found in disposable domains list
                      status: 403
                  email_exists:
                    value:
                      error: email_exists
                      error_description: There is a user with this email
                      status: 403

  /oauth2/login:
    post:
      operationId: loginOrRefresh
      tags: [OAuth2]
      summary: Login / Refresh Bearer Token
      description: |
        This single path serves two grant types in the source documentation:

        - `grant_type=password` — log in with username/password using a Basic token
          (see Basic Token Generation guide).
        - Refresh — exchange an existing Bearer token for a new one via the `token` field.
      security:
        - BasicAuth: []
          ProjectId: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              oneOf:
                - title: PasswordGrant
                  type: object
                  required: [username, password, grant_type]
                  properties:
                    username:
                      type: string
                      description: Your iFunny email address
                    password:
                      type: string
                      description: Your iFunny password
                    grant_type:
                      type: string
                      const: password
                - title: RefreshGrant
                  type: object
                  required: [token]
                  properties:
                    token:
                      type: string
                      description: Existing Bearer token to refresh
      responses:
        "200":
          description: Successfully logged in / refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: Your Bearer Token
                  token_type:
                    type: string
                    const: bearer
                  expires_in:
                    type: integer
                    description: In seconds (10 years)
                    example: 315360000
        "400":
          description: Invalid Credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: invalid_grant
                error_description: Wrong user credentials
                status: 400
        "403":
          description: Captcha Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptchaError"
        "429":
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: too_many_user_auths
                error_description: User auths rate exceed, please try again later.
                status: 429

  /oauth2/revoke:
    post:
      operationId: revokeAccessToken
      tags: [OAuth2]
      summary: Revoke Access Token
      description: Revokes a created access token. This will log out every device using this token.
      security:
        - BasicAuth: []
          ProjectId: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: Bearer Token to revoke
      responses:
        "200":
          description: Token successfully revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    const: 200

  /account:
    get:
      operationId: getClientAccount
      tags: [Client]
      summary: Fetch Profile
      description: Fetch account information for the client.
      security:
        - BearerAuth: []
          ProjectId: []
      responses:
        "200":
          description: Account Information
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ClientProfile"
                  status:
                    type: integer
                    const: 200
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: editClientAccount
      tags: [Client]
      summary: Edit Profile
      description: Edit profile information for the client.
      security:
        - BearerAuth: []
          ProjectId: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                nick:
                  type: string
                about:
                  type: string
                sex:
                  type: string
                  enum: [male, female, other]
                birth_date:
                  type: string
                  description: "YYYY-MM-DD"
                hometown:
                  type: string
                  description: Empty if none
                location:
                  type: string
                  description: Empty if none
                messaging_privacy_status:
                  type: string
                  enum: [public, subscribers, closed]
                is_private:
                  type: integer
                  enum: [0, 1]
                  description: "1: True - 0: False"
      responses:
        "200":
          description: Successfully edited
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    const: 200
        "401":
          $ref: "#/components/responses/Unauthorized"

  /account/email:
    put:
      operationId: updateClientEmail
      tags: [Client]
      summary: Update Email
      description: Update the email address associated with the client's account.
      security:
        - BearerAuth: []
          ProjectId: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  description: URL encoded email address
      responses:
        "200":
          description: Successfully Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    const: 200
        "401":
          $ref: "#/components/responses/Unauthorized"

  /account/password_change_request:
    post:
      operationId: requestPasswordChange
      tags: [Client]
      summary: Request Password Change
      description: Request an email to be sent to change a password.
      security:
        - BearerAuth: []
          ProjectId: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  description: URL encoded email address
      responses:
        "200":
          description: Request sent

  /users/my/comments:
    get:
      operationId: getClientComments
      tags: [Client]
      summary: Client Comments
      description: Paginate through comments made by the Client.
      security:
        - BearerAuth: []
          ProjectId: []
      parameters:
        - $ref: "#/components/parameters/Limit30"
      responses:
        "200":
          description: Client Comments
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      comments:
                        allOf:
                          - $ref: "#/components/schemas/PagedResult"
                          - properties:
                              items:
                                type: array
                                items:
                                  $ref: "#/components/schemas/Comment"
                  status:
                    type: integer
                    const: 200
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/my/blocked:
    get:
      operationId: getBlockedUsers
      tags: [Client]
      summary: Blocked Users
      description: Scroll through the Client's Blocked Users.
      security:
        - BearerAuth: []
          ProjectId: []
      responses:
        "200":
          description: Blocked Users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    allOf:
                      - $ref: "#/components/schemas/PagedResult"
                      - properties:
                          items:
                            type: array
                            items:
                              $ref: "#/components/schemas/BlockedUser"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/my/unread_chat_messages:
    get:
      operationId: getUnreadMessageCount
      tags: [Client]
      summary: Unread Messages
      description: Fetch the amount of unread messages the user has.
      security:
        - BearerAuth: []
          ProjectId: []
      responses:
        "200":
          description: Unread message count
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      unread_messages:
                        type: integer
                  status:
                    type: integer
                    const: 200
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/my/appeals:
    get:
      operationId: getClientAppeals
      tags: [Client]
      summary: Client Appeals
      description: Fetch the client ban/strike appeals.
      security:
        - BearerAuth: []
          ProjectId: []
      responses:
        "200":
          description: Appeal Array
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      appeals:
                        type: array
                        items:
                          $ref: "#/components/schemas/Appeal"
                  status:
                    type: integer
                    const: 200
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/my/chat_invitations:
    get:
      operationId: getChatInvitations
      tags: [Client]
      summary: Chat Invitations
      description: Fetch the client's current pending chat invites.
      security:
        - BearerAuth: []
          ProjectId: []
      responses:
        "200":
          description: Chat Invites
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      chats:
                        type: array
                        items:
                          $ref: "#/components/schemas/Chat"
                  status:
                    type: integer
                    const: 200
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/my/content_smiles:
    get:
      operationId: getClientSmiledContent
      tags: [Client]
      summary: Client Smiled Content
      description: Paginate through content that is smiled by the client.
      security:
        - BearerAuth: []
          ProjectId: []
      parameters:
        - $ref: "#/components/parameters/Limit30"
      responses:
        "200":
          description: Smiled Content
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      content:
                        allOf:
                          - $ref: "#/components/schemas/PagedResult"
                          - properties:
                              items:
                                type: array
                                items:
                                  $ref: "#/components/schemas/Content"
                  status:
                    type: integer
                    const: 200
        "401":
          $ref: "#/components/responses/Unauthorized"

  /feeds/reads:
    get:
      operationId: getClientReads
      tags: [Client]
      summary: Client Reads
      description: Paginate through content that the client has marked as viewed.
      security:
        - BasicAuth: []
          ProjectId: []
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Content Pagination
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
    delete:
      operationId: clearClientReads
      tags: [Client]
      summary: Clear Read History
      description: This clears all content from the Client's "reads".
      security:
        - BearerAuth: []
          ProjectId: []
      responses:
        "200":
          description: Cleared Read History
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    const: 200

  /reads/{ids}:
    get:
      operationId: markContentRead
      tags: [Client]
      summary: Mark Content as Read
      description: Add content to the Client's "reads".
      security:
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: ids
          in: path
          required: true
          schema:
            type: string
          description: List of Content IDs separated by a comma
      responses:
        "200":
          description: Marked as Read
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    const: 200

  /users/my/guests:
    get:
      operationId: getClientGuests
      tags: [Client]
      summary: Client Guests
      description: Paginate through users that have viewed the Client's profile.
      security:
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Guest Pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  guest:
                    $ref: "#/components/schemas/User"
                  visit_timestamp:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/my/bans:
    get:
      operationId: getClientBans
      tags: [Client]
      summary: Client Bans
      description: Paginate through the Client's bans.
      security:
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Client Bans
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      bans:
                        type: array
                        items:
                          $ref: "#/components/schemas/ClientBan"

  /counters:
    get:
      operationId: getNotificationCounters
      tags: [Client]
      summary: Notification Counters
      description: Fetch the notification counters for the client.
      security:
        - BasicAuth: []
          ProjectId: []
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: is_new
          in: query
          schema:
            type: boolean
          description: Doesn't seem to affect responses
      responses:
        "200":
          description: Client Counters
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/NotificationCounters"
                  status:
                    type: integer
                    const: 200
        "401":
          description: Invalid Grant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /search/users:
    get:
      operationId: searchUsers
      tags: [Users]
      summary: Search Users
      description: Search users by nick.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Nick to search for
        - $ref: "#/components/parameters/Limit30"
      responses:
        "200":
          description: Possible Users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      num:
                        type: array
                        items: {}
                        description: Haven't observed
                      users:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
                  status:
                    type: integer
                    const: 200
        "400":
          description: Empty Query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: empty_query
                error_description: Empty query
                status: 400

  /users/{id}:
    get:
      operationId: getUserById
      tags: [Users]
      summary: User by ID
      description: Fetch user profile by their unique ID.
      security:
        - BasicAuth: []
          ProjectId: []
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the user
      responses:
        "200":
          description: User Data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UserProfile"
                  status:
                    type: integer
                    const: 200
        "400":
          description: Invalid User Id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: bad_request
                error_description: Invalid user id
                status: 400
        "404":
          $ref: "#/components/responses/NotFound"

  /users/by_nick/{nick}:
    get:
      operationId: getUserByNick
      tags: [Users]
      summary: User By Nick
      description: Fetch a user profile by their nick.
      security:
        - BasicAuth: []
          ProjectId: []
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: nick
          in: path
          required: true
          schema:
            type: string
          description: The nick of the user
      responses:
        "200":
          description: User Profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UserProfile"
                  status:
                    type: integer
                    const: 200
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}/subscribers:
    put:
      operationId: subscribeToUser
      tags: [Users]
      summary: Subscribe to User
      description: Add user to the Client's subscriptions.
      security:
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subscribed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    const: 200
    delete:
      operationId: unsubscribeFromUser
      tags: [Users]
      summary: Unsubscribe to User
      description: Removes the user from the Client's subscriptions.
      security:
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unsubscribed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    const: 200
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}/updates_subcribers:
    put:
      operationId: subscribeToUserUpdates
      tags: [Users]
      summary: Subscribe to User Updates
      description: |
        Add the user to the Client's "updates" subscriptions.
        This will notify the client when the user uploads new content.

        Note: path spelling ("subcribers") matches the live API and is preserved as-is.
      security:
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subscribed to Updates
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    const: 200
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}/updates_subscribers:
    delete:
      operationId: unsubscribeFromUserUpdates
      tags: [Users]
      summary: Unsubscribe to User Updates
      description: |
        Remove the user from the Client's "updates" subscriptions.
        This will stop iFunny notifying the Client when the user uploads new content.

        Note: this path is spelled "subscribers" (unlike the PUT variant's "subcribers"),
        matching the live API's inconsistency.
      security:
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unsubscribed to Updates
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    const: 200
        "404":
          $ref: "#/components/responses/NotFound"

  /timelines/user/{id}:
    get:
      operationId: getUserTimeline
      tags: [Users]
      summary: Scroll Timeline
      description: |
        Paginate through content on the user's timeline.

        If a Basic token is used, it will only show original content, not republished content.
        If a Bearer token is used, it will include republished content.
      security:
        - BasicAuth: []
          ProjectId: []
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/Limit30"
      responses:
        "200":
          description: User Timeline
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      content:
                        allOf:
                          - $ref: "#/components/schemas/PagedResult"
                          - properties:
                              items:
                                type: array
                                items:
                                  $ref: "#/components/schemas/Content"
                  status:
                    type: integer
                    const: 200
        "404":
          $ref: "#/components/responses/NotFound"

  /feeds/featured:
    get:
      operationId: getFeaturedFeed
      tags: [Content]
      summary: Scroll Featured
      description: Paginate through content in featured.
      security:
        - BasicAuth: []
          ProjectId: []
        - BearerAuth: []
          ProjectId: []
      parameters:
        - $ref: "#/components/parameters/Limit30"
        - name: is_new
          in: query
          schema:
            type: boolean
          description: Seems to have no effect on responses
      responses:
        "200":
          description: Featured Content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"

  /feeds/collective:
    post:
      operationId: getCollectiveFeed
      tags: [Content]
      summary: Scroll Collective
      description: |
        Paginate through content in collective. Unclear why iFunny made this a POST
        instead of GET.
      security:
        - BasicAuth: []
          ProjectId: []
        - BearerAuth: []
          ProjectId: []
      parameters:
        - $ref: "#/components/parameters/Limit30"
      responses:
        "200":
          description: Collective Content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"

  /timelines/home:
    get:
      operationId: getSubscriptionTimeline
      tags: [Content]
      summary: Scroll Subscription Timeline
      description: Paginate through content in the Client's subscription Feed.
      security:
        - BearerAuth: []
          ProjectId: []
      parameters:
        - $ref: "#/components/parameters/Limit30"
      responses:
        "200":
          description: Subscription Feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"

  /content/{id}:
    get:
      operationId: getContentById
      tags: [Content]
      summary: Get Content by ID
      description: Fetch content by its ID.
      security:
        - BasicAuth: []
          ProjectId: []
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Content
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Content"
                  status:
                    type: integer
                    const: 200
        "404":
          description: Content Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: not_found
                error_description: Content not found
                status: 404
    delete:
      operationId: deleteContent
      tags: [Content]
      summary: Delete Content
      description: |
        Delete a post. Only the author may call this. Returns a task-style
        envelope; poll `GET /tasks/{id}` for terminal state.
      security:
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deletion accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "./schemas/task.yaml#/Task"
                  status:
                    type: integer
                    const: 200
        "403":
          description: Forbidden (not content owner)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: modifyContent
      tags: [Content]
      summary: Modify Content
      description: |
        Update a delayed/scheduled post's publish time or visibility.
        Send exactly one of `publish_at` or `visibility`.
      security:
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                publish_at:
                  type: integer
                  description: New scheduled publish time (Unix seconds).
                visibility:
                  type: string
                  enum: [public, subscribers]
                  description: New visibility for a still-delayed post.
      responses:
        "200":
          description: Updated
        "403":
          description: Forbidden (not content owner, or already published)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"

  /content:
    post:
      operationId: uploadContent
      tags: [Content]
      summary: Upload Content
      description: |
        Uploads new content.

        Note: the source documentation listed this as `GET /content`; corrected to
        `POST` here since the request body is `multipart/form-data`.
      security:
        - BearerAuth: []
          ProjectId: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [type, tags]
              properties:
                type:
                  type: string
                  description: Content type (see ContentType schema)
                tags:
                  type: array
                  items:
                    type: string
                  description: Array of tags to apply to the post
                video:
                  type: string
                  contentEncoding: base64
                  description: Bytes for the video
      responses:
        "202":
          description: Content Upload Pending
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: UUID v1
                      type:
                        type: string
                        const: content_uploading
                      state:
                        type: string
                        enum: [pending, failure, success]
                      retry_after:
                        type: integer
                        description: Seconds; only present on "pending"
                      result:
                        type: object
                        description: Only present on "success"
                        properties:
                          cid:
                            type: string
                            description: Content ID of the uploaded post
                      error:
                        type: string
                        description: Only present on "failure"
                      error_description:
                        type: string
                        description: Only present on "failure"
                  status:
                    type: integer
                    const: 202

  /content/{id}/republished:
    post:
      operationId: republishContent
      tags: [Content]
      summary: Republish Content
      description: Republish the content to your account.
      security:
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Republished
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: ID of republished post
                      num_republished:
                        type: integer
