    delete:
      operationId: removeCommentUnsmile
      tags: [Comments]
      summary: Remove Comment Unsmile
      description: |
        This will remove a comment's Unsmile. **NOT** the same as smiling the Content.
      security:
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: content_id
          in: path
          required: true
          schema:
            type: string
        - name: comment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comment Smile Nums
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentSmileCountsResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ----- Split-file path entries -----
  # Path items maintained in ./paths/*.yaml. Grouped by app feature to mirror
  # the layout of the upstream client libraries (Chat, Content actions,
  # Comments CRUD, User moderation, Discovery/digests, Tasks, availability).

  # User moderation
  /users/my/blocked/{user_id}:
    $ref: "./paths/user-moderation.yaml#/~1users~1my~1blocked~1{user_id}"
  /users/{user_id}/abuses:
    $ref: "./paths/user-moderation.yaml#/~1users~1{user_id}~1abuses"

  # Content moderation & mutation (DELETE/PATCH on /content/{id} and POST on
  # /content/{id}/comments are defined inline above)
  /content/{id}/tags:
    $ref: "./paths/content-actions.yaml#/~1content~1{id}~1tags"
  /content/{id}/pinned:
    $ref: "./paths/content-actions.yaml#/~1content~1{id}~1pinned"
  /content/{id}/abuses:
    $ref: "./paths/content-actions.yaml#/~1content~1{id}~1abuses"

  # Comment CRUD / moderation
  /content/{content_id}/comments/{comment_id}:
    $ref: "./paths/comments-crud.yaml#/~1content~1{content_id}~1comments~1{comment_id}"
  /content/{content_id}/comments/{comment_id}/replies:
    $ref: "./paths/comments-crud.yaml#/~1content~1{content_id}~1comments~1{comment_id}~1replies"
  /content/{content_id}/comments/{comment_id}/abuses:
    $ref: "./paths/comments-crud.yaml#/~1content~1{content_id}~1comments~1{comment_id}~1abuses"

  # Chat channel discovery (REST). See externalDocs for WAMP messaging.
  /chats/channels/by_link/{link}:
    $ref: "./paths/chat-discovery.yaml#/~1chats~1channels~1by_link~1{link}"
  /chats/trending:
    $ref: "./paths/chat-discovery.yaml#/~1chats~1trending"
  /chats/open_channels:
    $ref: "./paths/chat-discovery.yaml#/~1chats~1open_channels"
  /search/chats/channels:
    $ref: "./paths/chat-discovery.yaml#/~1search~1chats~1channels"

  # Discovery: explore compilations, digests, by-nick timeline
  /explore/compilation/{id}:
    $ref: "./paths/discovery.yaml#/~1explore~1compilation~1{id}"
  /digest_groups:
    $ref: "./paths/discovery.yaml#/~1digest_groups"
  /digests/{digest_id}/reads/{count}:
    $ref: "./paths/discovery.yaml#/~1digests~1{digest_id}~1reads~1{count}"
  /timelines/users/by_nick/{nick}:
    $ref: "./paths/discovery.yaml#/~1timelines~1users~1by_nick~1{nick}"

  # Tasks & pre-signup availability
  /tasks/{task_id}:
    $ref: "./paths/tasks-and-availability.yaml#/~1tasks~1{task_id}"
  /nicks/available:
    $ref: "./paths/tasks-and-availability.yaml#/~1nicks~1available"
  /emails/available:
    $ref: "./paths/tasks-and-availability.yaml#/~1emails~1available"

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      description: |
        A "Basic" token derived from client id/secret + a generated UUID, not a
        username/password pair. See the "Basic Token Generation" guide.
    BearerAuth:
      type: http
      scheme: bearer
      description: Bearer token obtained via `POST /oauth2/login` (password grant).
    ProjectId:
      type: apiKey
      in: header
      name: ifunny-project-id
      description: Always required; value is the literal string "iFunny".

  parameters:
    Limit30:
      name: limit
      in: query
      schema:
        type: integer
        default: 30

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            status: 401
            error: unauthorized
            error_description: string
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: not_found
            error_description: string
            status: 404

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        error_description:
          type: string
        status:
          type: integer

