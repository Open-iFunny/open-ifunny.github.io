        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Content Smiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmileCountsResponse"
    delete:
      operationId: removeContentSmile
      tags: [Content]
      summary: Remove Content Smile
      description: |
        Remove the Client's smile on the content.
        **NOT** the same as unsmiling the content.
      security:
        - BasicAuth: []
          ProjectId: []
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
          description: A "Seen" From Tag
      responses:
        "200":
          description: Content Smiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmileCountsResponse"

  /content/{id}/unsmiles:
    put:
      operationId: unsmileContent
      tags: [Content]
      summary: Unsmile Content
      description: Unsmiles (dislikes) a content.
      security:
        - BasicAuth: []
          ProjectId: []
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
          description: A "Seen" From Tag
      responses:
        "200":
          description: Content Smiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmileCountsResponse"
    delete:
      operationId: removeContentUnsmile
      tags: [Content]
      summary: Remove Content Unsmile
      description: |
        Removes the Client's Unsmile from the Content.
        **NOT** the same as smiling the Content.
      security:
        - BasicAuth: []
          ProjectId: []
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Content Smiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmileCountsResponse"

  /content/{id}/categories:
    put:
      operationId: addContentCategories
      tags: [Content]
      summary: Add Content Categories
