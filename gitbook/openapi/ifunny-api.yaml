                  status:
                    type: integer
                    const: 200
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteRepublish
      tags: [Content]
      summary: Delete Republish
      description: If the client has republished the content, this will remove it.
      security:
        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Un-republished
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      num_republished:
                        type: integer

  /content/{id}/smiles:
    put:
      operationId: smileContent
      tags: [Content]
      summary: Smile Content
      description: |
        Smiles (likes) the content.

        - Using a Bearer will increase `smiles` in Content Nums.
        - Using a Basic will increase `guest_smiles` in Content Nums.
      security:
        - BasicAuth: []
