        - BearerAuth: []
          ProjectId: []
      parameters:
        - name: content_id
          in: path
          required: true
          schema:
            type: string
        - name: comment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comment Smiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentSmileCountsResponse"
        "403":
          description: Authorization Required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"

  /content/{content_id}/comments/{comment_id}/unsmiles:
    put:
      operationId: unsmileComment
