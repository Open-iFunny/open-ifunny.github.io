# Content (post) mutation and moderation actions.
# `GET /content/{id}` and `GET /content/{id}/comments` live in the root spec
# since they were already documented; these files add the new methods on
# separate path items (tags, pinned, abuses) and net-new DELETE/PATCH on
# /content/{id} via the root's `paths` map (see how root refs the parent
# key for each entry below).

"/content/{id}/tags":
  put:
    operationId: modifyContentTags
    tags: [Content]
    summary: Modify Content Tags
    description: Replace the set of tags on a post owned by the client.
    security:
      - BearerAuth: []
        ProjectId: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            required: [tags]
            properties:
              tags:
                type: array
                description: New tag list. Replaces existing tags.
                items:
                  type: string
    responses:
      "200":
        description: Tags updated
      "403":
        description: Forbidden (not content owner)
        content:
          application/json:
            schema:
              $ref: "../ifunny-api.yaml#/components/schemas/Error"
      "404":
        $ref: "../ifunny-api.yaml#/components/responses/NotFound"

"/content/{id}/pinned":
  put:
    operationId: pinContent
    tags: [Content]
    summary: Pin Content
    description: |
      Pin the post to the top of the client's profile timeline.
      Client must be the author.
    security:
      - BearerAuth: []
        ProjectId: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Pinned
      "403":
        description: Forbidden (not content owner)
        content:
          application/json:
            schema:
              $ref: "../ifunny-api.yaml#/components/schemas/Error"
      "404":
        $ref: "../ifunny-api.yaml#/components/responses/NotFound"
  delete:
    operationId: unpinContent
    tags: [Content]
    summary: Unpin Content
    description: Remove the pin from the post.
    security:
      - BearerAuth: []
        ProjectId: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Unpinned
      "404":
        $ref: "../ifunny-api.yaml#/components/responses/NotFound"

"/content/{id}/abuses":
  put:
    operationId: reportContent
    tags: [Content]
    summary: Report Content
    description: |
      Report a post for abuse. Query parameter `type` categorizes the report.
    security:
      - BearerAuth: []
        ProjectId: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: type
        in: query
        required: true
        description: Abuse category.
        schema:
          type: string
          enum: [hate, nude, spam, harm, target]
    responses:
      "200":
        description: Report accepted
      "404":
        $ref: "../ifunny-api.yaml#/components/responses/NotFound"

# Note: DELETE and PATCH on /content/{id} itself are added inline in the root
# spec (ifunny-api.yaml) alongside the existing GET, since OpenAPI only allows
# one Path Item Object per path key. See root paths section.
